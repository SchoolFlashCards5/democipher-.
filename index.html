<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        background-color: black;
      }

      h1 {
        font-family:Verdana, Geneva, Tahoma, sans-serif;
        font-weight: 500;
        color: #00ff62;
      }

      h2 {
        font-family:Verdana, Geneva, Tahoma, sans-serif;
        font-weight: 500;
        color: #00ff62;
        font-size: 15px;
      }

      p {
        font-family:Verdana, Geneva, Tahoma, sans-serif;
        font-weight: 500;
        color: #00ff62;
      }

      hr {
        border: none;
        height: 2px;
        background-color: #00ff62;
      }

      input {
        background-color: #005721;
        color: #00ff62;
        border: none;
      }

      button {
        background-color: #005721;
        height: 20px;
        border: none;
        margin-left: 10px;
        color: #00ca4e;
      }

      button:hover {
        transform: scale(1.05);
        transition-duration: 0.37s;
      }

      button:not(:hover) {
        transition-duration: 0.2s;
      }

      button:active {
        transform: scale(1.1);
        transition-duration: 0.1s;
      }

      button:not(:active) {
        transition-duration: 0.1s;
      }

      p.foot {
        font-size: 13px !important;
      }

      .cipherout,.decipherout {
        font-size: 20px;
        font-weight: 700;
      }
    </style>
    <title>democipher!</title>
  </head>
  <body>
    <!-- top -->
    <h1>democipher!</h1>
    <p>encode it. decode it. cipher it.</p>
    <!-- end top-->

    <hr>

    <!-- cipher area -->
    <p>text to cipher: </p>
    <input id="cipherinput" value="cipher">
    <p>amount to shift forward: </p>
    <input id="cipheramount" type="number" min="1" value="1">
    <button id="cipheractivate">cipher!</button>
    <h2>ciphered text:</h2>
    <p id="cipherout" class="cipherout">‎</p>
    <!-- end cipher area-->

    <hr>

    <!-- de cipher area-->
    <p>cipher to text: </p>
    <input id="decipherinput" value="djqifs">
    <p>amount to shift backward: </p>
    <input id="decipheramount" type="number" min="1" value="1">
    <button id="decipheractivate">decipher!</button>
    <p id="decipherout" class="decipherout">‎</p>
    <!-- end de cipher area -->

    <hr>

    <footer>
      <p class="foot">Made by SchoolFlashCards5 - AKA Nny</p>
    </footer>

    <script>
      // ---------------------
      // cipher js
      // ---------------------
      document.getElementById("cipheractivate").addEventListener("click", function() {
      let text = document.getElementById("cipherinput").value;
      let shift = ((parseInt(document.getElementById("cipheramount").value) % 26) + 26) % 26;
      let output = "";

      for (let i = 0; i < text.length; i++) {
        let char = text[i];
        if (char.match(/[a-zA-Z]/)) {
          let base = char === char.toUpperCase() ? 65 : 97;
          output += String.fromCharCode(((char.charCodeAt(0) - base + shift) % 26) + base);
        } else {
          output += char;
        }
      }

      document.getElementById("cipherout").textContent = output;
    });

    // ---------------------
    // decipher area
    // ---------------------
    document.getElementById("decipheractivate").addEventListener("click", function() {
      let text = document.getElementById("decipherinput").value;
      let shift = ((parseInt(document.getElementById("decipheramount").value) % 26) + 26) % 26;
      let output = "";

      for (let i = 0; i < text.length; i++) {
        let char = text[i];
        if (char.match(/[a-zA-Z]/)) {
          let base = char === char.toUpperCase() ? 65 : 97;
          output += String.fromCharCode(((char.charCodeAt(0) - base - shift + 26) % 26) + base);
        } else {
          output += char;
        }
      }

      document.getElementById("decipherout").textContent = output;
    });
    </script>
  </body>
</html>
